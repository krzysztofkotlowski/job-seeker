# Job Seeker Tracker — Production
# Run from project root: docker compose -f deploy/docker-compose.prod.yml up -d
# Requires .env in project root (copy from deploy/env.example.prod)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobseeker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobseeker}
      POSTGRES_DB: jobseeker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobseeker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - jobseeker

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - jobseeker

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - jobseeker

  ollama:
    image: ollama/ollama:0.17.7
    deploy:
      resources:
        limits:
          cpus: "${OLLAMA_CPU_LIMIT:-5}"
          memory: 10G
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-5}
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - jobseeker

  # One-shot: pull embedding + LLM models before backend starts
  ollama-init:
    image: ollama/ollama:0.17.7
    entrypoint: ["/bin/sh", "-c"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - EMBED_DIMS=${EMBED_DIMS:-384}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
    command: >
      echo 'Waiting for Ollama...';
      for i in $$(seq 1 30); do
        if ollama list 2>/dev/null; then echo 'Ollama ready.'; break; fi;
        sleep 2;
      done;
      echo 'Pulling embedding model: '$${EMBED_MODEL};
      ollama pull $$EMBED_MODEL || exit 1;
      echo 'Pulling LLM model: '$${LLM_MODEL};
      ollama pull $$LLM_MODEL || exit 1;
      echo 'Models ready.'
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - jobseeker
    restart: "no"

  backend:
    build: ../backend
    environment:
      - DATABASE_URL=postgresql://jobseeker:${POSTGRES_PASSWORD:-jobseeker}@postgres:5432/jobseeker
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      - KEYCLOAK_REALM=jobseeker
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-false}
      - LLM_URL=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
      - LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS:-400}
      - LLM_TIMEOUT=30
      - LLM_SUMMARIZE_TIMEOUT=90
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_TIMEOUT=30
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - EMBED_DIMS=${EMBED_DIMS:-384}
      - RAG_ENABLED=${RAG_ENABLED:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_ALWAYS_EAGER=0
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - jobseeker

  frontend:
    build: ../frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - jobseeker

  worker:
    build: ../backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info -Q jobseeker
    environment:
      - DATABASE_URL=postgresql://jobseeker:${POSTGRES_PASSWORD:-jobseeker}@postgres:5432/jobseeker
      - LLM_URL=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
      - LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS:-400}
      - LLM_TIMEOUT=30
      - LLM_SUMMARIZE_TIMEOUT=90
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_TIMEOUT=30
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - EMBED_DIMS=${EMBED_DIMS:-384}
      - RAG_ENABLED=${RAG_ENABLED:-true}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_ALWAYS_EAGER=0
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - jobseeker

volumes:
  pgdata:
  ollama_models:
  esdata:

networks:
  jobseeker:
    driver: bridge
