# Job Seeker Tracker — Production
# Run from project root: docker compose -f deploy/docker-compose.prod.yml up -d
# Requires .env in project root (copy from deploy/env.example.prod)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobseeker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobseeker}
      POSTGRES_DB: jobseeker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobseeker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - jobseeker

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - jobseeker

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - jobseeker

  thin-llama:
    platform: ${THIN_LLAMA_PLATFORM:-linux/amd64}
    build:
      context: ${THIN_LLAMA_BUILD_CONTEXT:-../../thin-llama}
      dockerfile: Dockerfile
    image: thin-llama:job-seeker-prod
    volumes:
      - thin_llama_models:/models
      - thin_llama_state:/state
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      - jobseeker

  thin-llama-init:
    image: curlimages/curl:8.8.0
    entrypoint: ["/bin/sh", "-c"]
    environment:
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
    command: >
      echo 'Waiting for thin-llama...';
      for i in $$(seq 1 30); do
        if curl -sf http://thin-llama:8080/health >/dev/null; then echo 'thin-llama ready.'; break; fi;
        sleep 2;
      done;
      echo 'Pulling embedding model: '$${EMBED_MODEL};
      embed_pull_code=$$(curl -sS -o /tmp/embed-pull.out -w "%{http_code}" -X POST http://thin-llama:8080/api/pull -H 'Content-Type: application/json' -d "{\"model\":\"$${EMBED_MODEL}\"}");
      if [ "$${embed_pull_code}" -lt 200 ] || [ "$${embed_pull_code}" -ge 300 ]; then
        echo 'Embedding pull failed with status' "$${embed_pull_code}";
        cat /tmp/embed-pull.out;
        exit 1;
      fi;
      cat /tmp/embed-pull.out;
      echo 'Pulling chat model: '$${LLM_MODEL};
      chat_pull_code=$$(curl -sS -o /tmp/chat-pull.out -w "%{http_code}" -X POST http://thin-llama:8080/api/pull -H 'Content-Type: application/json' -d "{\"model\":\"$${LLM_MODEL}\"}");
      if [ "$${chat_pull_code}" -lt 200 ] || [ "$${chat_pull_code}" -ge 300 ]; then
        echo 'Chat pull failed with status' "$${chat_pull_code}";
        cat /tmp/chat-pull.out;
        exit 1;
      fi;
      cat /tmp/chat-pull.out;
      echo 'Activating models...';
      activate_code=$$(curl -sS -o /tmp/activate.out -w "%{http_code}" -X POST http://thin-llama:8080/api/models/active -H 'Content-Type: application/json' -d "{\"chat\":\"$${LLM_MODEL}\",\"embedding\":\"$${EMBED_MODEL}\"}");
      if [ "$${activate_code}" -lt 200 ] || [ "$${activate_code}" -ge 300 ]; then
        echo 'Model activation failed with status' "$${activate_code}";
        cat /tmp/activate.out;
        exit 1;
      fi;
      cat /tmp/activate.out;
      echo 'Models ready.'
    depends_on:
      thin-llama:
        condition: service_healthy
    networks:
      - jobseeker
    restart: "no"

  backend:
    build: ../backend
    environment:
      - DATABASE_URL=postgresql://jobseeker:${POSTGRES_PASSWORD:-jobseeker}@postgres:5432/jobseeker
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      - KEYCLOAK_REALM=jobseeker
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-false}
      - LLM_URL=http://thin-llama:8080
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS:-400}
      - LLM_TIMEOUT=30
      - LLM_SUMMARIZE_TIMEOUT=90
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_TIMEOUT=30
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - EMBED_DIMS=${EMBED_DIMS:-384}
      - RAG_ENABLED=${RAG_ENABLED:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_ALWAYS_EAGER=0
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      thin-llama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - jobseeker

  frontend:
    build: ../frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - jobseeker

  worker:
    build: ../backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info -Q jobseeker
    environment:
      - DATABASE_URL=postgresql://jobseeker:${POSTGRES_PASSWORD:-jobseeker}@postgres:5432/jobseeker
      - LLM_URL=http://thin-llama:8080
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS:-400}
      - LLM_TIMEOUT=30
      - LLM_SUMMARIZE_TIMEOUT=90
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_TIMEOUT=30
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - EMBED_DIMS=${EMBED_DIMS:-384}
      - RAG_ENABLED=${RAG_ENABLED:-true}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_ALWAYS_EAGER=0
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      thin-llama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - jobseeker

volumes:
  pgdata:
  thin_llama_models:
  thin_llama_state:
  esdata:

networks:
  jobseeker:
    driver: bridge
