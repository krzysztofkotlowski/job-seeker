services:
  keycloak:
    profiles:
      - keycloak
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: localhost
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobseeker
      POSTGRES_PASSWORD: jobseeker
      POSTGRES_DB: jobseeker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobseeker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.17.7
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 10G
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_NUM_THREAD=4
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://jobseeker:jobseeker@postgres:5432/jobseeker
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_PUBLIC_URL=http://localhost:8080
      - KEYCLOAK_REALM=jobseeker
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-false}
      - LLM_URL=http://ollama:11434
      # LLM: default qwen2.5:7b; change to qwen3:4b, llama3.2:3b, etc. for different quality
      - LLM_MODEL=qwen2.5:7b
      - LLM_MAX_OUTPUT_TOKENS=400
      - LLM_TIMEOUT=30
      - LLM_SUMMARIZE_TIMEOUT=90
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_TIMEOUT=30
      - EMBED_MODEL=all-minilm
      - EMBED_DIMS=384
      - RAG_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_ALWAYS_EAGER=0
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info -Q jobseeker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://jobseeker:jobseeker@postgres:5432/jobseeker
      - LLM_URL=http://ollama:11434
      - LLM_MODEL=qwen2.5:7b
      - LLM_MAX_OUTPUT_TOKENS=400
      - LLM_TIMEOUT=30
      - LLM_SUMMARIZE_TIMEOUT=90
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_TIMEOUT=30
      - EMBED_MODEL=all-minilm
      - EMBED_DIMS=384
      - RAG_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_ALWAYS_EAGER=0
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  ollama_models:
  esdata:
