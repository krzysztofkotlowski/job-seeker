services:
  keycloak:
    profiles:
      - keycloak
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: localhost
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobseeker
      POSTGRES_PASSWORD: jobseeker
      POSTGRES_DB: jobseeker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobseeker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  thin-llama:
    platform: ${THIN_LLAMA_PLATFORM:-linux/amd64}
    build:
      context: ${THIN_LLAMA_BUILD_CONTEXT:-../thin-llama}
      dockerfile: Dockerfile
      args:
        VERSION: ${THIN_LLAMA_VERSION:-git}
        COMMIT: ${THIN_LLAMA_GIT_REF:-unknown}
        BUILD_DATE: ${THIN_LLAMA_BUILD_DATE:-unknown}
    image: thin-llama:job-seeker-local
    ports:
      - "18080:8080"
    volumes:
      - thin_llama_models:/models
      - thin_llama_state:/state
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  thin-llama-init:
    image: curlimages/curl:8.8.0
    entrypoint: ["/bin/sh", "/thin-llama-init.sh"]
    environment:
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
    volumes:
      - ./deploy/scripts/thin-llama-init.sh:/thin-llama-init.sh:ro
    depends_on:
      thin-llama:
        condition: service_healthy
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://jobseeker:jobseeker@postgres:5432/jobseeker
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_PUBLIC_URL=http://localhost:8080
      - KEYCLOAK_REALM=jobseeker
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-false}
      - LLM_URL=http://thin-llama:8080
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - LLM_MAX_OUTPUT_TOKENS=400
      - LLM_TIMEOUT=30
      - LLM_SUMMARIZE_TIMEOUT=90
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_TIMEOUT=30
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - EMBED_DIMS=${EMBED_DIMS:-384}
      - RAG_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_ALWAYS_EAGER=0
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      thin-llama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info -Q jobseeker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://jobseeker:jobseeker@postgres:5432/jobseeker
      - LLM_URL=http://thin-llama:8080
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - LLM_MAX_OUTPUT_TOKENS=400
      - LLM_TIMEOUT=30
      - LLM_SUMMARIZE_TIMEOUT=90
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ES_TIMEOUT=30
      - EMBED_MODEL=${EMBED_MODEL:-all-minilm}
      - EMBED_DIMS=${EMBED_DIMS:-384}
      - RAG_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_ALWAYS_EAGER=0
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      thin-llama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  thin_llama_models:
  thin_llama_state:
  esdata:
